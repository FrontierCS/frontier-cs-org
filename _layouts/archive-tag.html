---
layout: default
---

<section class="fc-archive">
  <p class="fc-archive-eyebrow">Tag</p>
  <h1>{{ page.title }}</h1>
  <p class="fc-archive-subtitle">{{ page.posts.size }} post{% if page.posts.size != 1 %}s{% endif %} tagged "{{ page.title }}".</p>
</section>

<section class="blog-list-grid">
  {% for post in page.posts %}
  {% include blog_card.html post=post %}
  {% endfor %}
</section>
