---
layout: default
---

<section class="fc-archive">
  <p class="fc-archive-eyebrow">Year</p>
  <h1>{{ page.date | date: "%Y" }}</h1>
  <p class="fc-archive-subtitle">{{ page.posts.size }} post{% if page.posts.size != 1 %}s{% endif %} published in {{ page.date | date: "%Y" }}.</p>
</section>

<section class="blog-list-grid">
  {% for post in page.posts %}
  {% include blog_card.html post=post %}
  {% endfor %}
</section>
